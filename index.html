<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      animation: hueShift 8s linear infinite;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
    }

    @keyframes hueShift {
      0%   { background: radial-gradient(ellipse at center, #1a0a2e 0%, #0d1b3e 50%, #0a2a1f 100%); }
      25%  { background: radial-gradient(ellipse at center, #0a2030 0%, #1a0a2e 50%, #2a0a3e 100%); }
      50%  { background: radial-gradient(ellipse at center, #0d1b3e 0%, #0a2a1f 50%, #1a0010 100%); }
      75%  { background: radial-gradient(ellipse at center, #2a0a3e 0%, #0d2030 50%, #0a1a2e 100%); }
      100% { background: radial-gradient(ellipse at center, #1a0a2e 0%, #0d1b3e 50%, #0a2a1f 100%); }
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #39ff14;
      text-shadow: 0 0 12px #39ff1488;
      margin-bottom: 12px;
    }

    /* ── Auth Modal ── */
    #auth-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    #auth-modal.hidden { display: none; }

    #auth-box {
      background: #1a1a2e;
      border: 1px solid #39ff1444;
      border-radius: 12px;
      padding: 36px 40px;
      width: 340px;
      box-shadow: 0 0 40px #39ff1422;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    #auth-box h2 {
      text-align: center;
      font-size: 1.4rem;
      color: #39ff14;
      letter-spacing: 0.1em;
      text-shadow: 0 0 8px #39ff1466;
    }

    #auth-box input {
      width: 100%;
      padding: 10px 14px;
      background: #111;
      border: 1px solid #333;
      border-radius: 6px;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    #auth-box input:focus { border-color: #39ff1488; }

    #auth-submit {
      padding: 11px;
      background: #39ff14;
      color: #111;
      font-weight: bold;
      font-size: 1rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: opacity 0.2s, box-shadow 0.2s;
      box-shadow: 0 0 12px #39ff1466;
    }
    #auth-submit:hover { opacity: 0.9; box-shadow: 0 0 20px #39ff1488; }
    #auth-submit:disabled { opacity: 0.5; cursor: default; }

    #auth-toggle {
      text-align: center;
      font-size: 0.85rem;
      color: #888;
    }
    #auth-toggle span {
      color: #39ff14;
      cursor: pointer;
      text-decoration: underline;
    }

    #auth-error {
      color: #ff4136;
      font-size: 0.85rem;
      text-align: center;
      min-height: 18px;
    }

    /* ── Main Layout ── */
    #user-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      width: 100%;
      margin-bottom: 10px;
      padding: 0 2px;
    }

    #user-bar span { font-size: 0.9rem; color: #aaa; }
    #user-bar strong { color: #39ff14; }

    #logout-btn {
      background: transparent;
      border: 1px solid #333;
      color: #888;
      font-size: 0.8rem;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    #logout-btn:hover { color: #fff; border-color: #666; }

    #columns {
      display: flex;
      gap: 24px;
      align-items: flex-start;
      width: fit-content;
    }

    #game-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 604px;
    }

    #score-display {
      font-size: 1.1rem;
      color: #aaa;
      letter-spacing: 0.08em;
    }
    #score-display span { color: #fff; font-weight: bold; }

    #canvas-wrap {
      position: relative;
      width: 600px;
      height: 600px;
    }

    canvas {
      display: block;
      border: 2px solid #2a2a2a;
      border-radius: 4px;
      box-shadow: 0 0 30px #39ff1422;
    }

    #hint {
      font-size: 0.8rem;
      color: #444;
      letter-spacing: 0.06em;
    }

    /* ── Leaderboard Panel ── */
    #lb-panel {
      width: 200px;
      background: #0d0d1a;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 0 20px rgba(57,255,20,0.05);
      margin-top: 131px;
    }

    #lb-panel h3 {
      text-align: center;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #39ff14;
      text-shadow: 0 0 8px #39ff1455;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid #1e1e2e;
    }

    #leaderboard-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    #leaderboard-list li {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      padding: 5px 6px;
      border-radius: 4px;
    }

    #leaderboard-list li.me {
      background: #39ff1415;
      border: 1px solid #39ff1433;
    }

    .lb-rank {
      color: #555;
      font-size: 0.7rem;
      width: 14px;
      text-align: right;
      flex-shrink: 0;
    }
    li.me .lb-rank { color: #39ff1488; }

    .lb-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #ccc;
    }
    li.me .lb-name { color: #39ff14; }

    .lb-score {
      color: #fff;
      font-weight: bold;
      font-size: 0.78rem;
      flex-shrink: 0;
    }

    #lb-status {
      text-align: center;
      color: #444;
      font-size: 0.8rem;
      padding: 10px 0;
    }

    /* ── Multiplayer UI ── */
    #mp-entry, #mp-lobby {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      width: 600px;
      min-height: 300px;
      background: #0d0d1a;
      border: 2px solid #2a2a3a;
      border-radius: 8px;
      padding: 44px 32px;
      box-shadow: 0 0 30px #39ff1422;
      justify-content: center;
    }

    .mp-heading {
      font-size: 0.9rem;
      color: #666;
      letter-spacing: 0.05em;
    }

    .mp-btn {
      padding: 12px 0;
      background: #39ff14;
      color: #111;
      font-weight: bold;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.2s, box-shadow 0.2s;
      box-shadow: 0 0 12px #39ff1466;
      width: 200px;
    }
    .mp-btn:hover { opacity: 0.88; box-shadow: 0 0 20px #39ff1488; }
    .mp-btn.secondary {
      background: transparent;
      border: 1px solid #39ff1466;
      color: #39ff14;
      box-shadow: none;
    }
    .mp-btn.secondary:hover { background: #39ff1415; }

    .mp-join-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .mp-join-row input {
      padding: 10px 14px;
      background: #111;
      border: 1px solid #333;
      border-radius: 6px;
      color: #fff;
      font-size: 1rem;
      width: 130px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      outline: none;
      font-family: inherit;
    }
    .mp-join-row input:focus { border-color: #39ff1488; }
    .mp-join-row .mp-btn { width: auto; padding: 10px 22px; }

    #room-code-display {
      font-size: 1.6rem;
      font-weight: bold;
      color: #39ff14;
      letter-spacing: 0.25em;
      text-shadow: 0 0 10px #39ff1466;
      background: #39ff1415;
      border: 1px solid #39ff1433;
      border-radius: 8px;
      padding: 14px 32px;
      user-select: all;
      cursor: default;
    }

    #lobby-players {
      list-style: none;
      width: 100%;
      max-width: 280px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #lobby-players li {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      background: #1a1a2e;
      border-radius: 6px;
      font-size: 0.95rem;
    }
    .lobby-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    #lobby-status {
      font-size: 0.85rem;
      color: #555;
      text-align: center;
    }

    /* ── MP End Overlay ── */
    #mp-end-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.86);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      gap: 10px;
      padding: 32px;
    }
    #mp-end-overlay h2 {
      font-size: 2rem;
      color: #fff;
      margin-bottom: 8px;
    }
    #mp-end-scores {
      list-style: none;
      width: 100%;
      max-width: 320px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 14px;
    }
    #mp-end-scores li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: rgba(255,255,255,0.06);
      border-radius: 6px;
      font-size: 1rem;
    }
    #mp-end-scores li:first-child {
      background: rgba(57,255,20,0.1);
      border: 1px solid #39ff1433;
    }
    .end-rank { color: #666; width: 20px; text-align: center; flex-shrink: 0; }
    .end-dot  { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .end-name { flex: 1; color: #ddd; }
    .end-score { font-weight: bold; color: #fff; flex-shrink: 0; }
  </style>
</head>
<body>

  <!-- Auth Modal -->
  <div id="auth-modal">
    <div id="auth-box">
      <h2 id="auth-title">Sign Up</h2>
      <input id="auth-username" type="text" placeholder="Username" maxlength="20" autocomplete="off" />
      <input id="auth-password" type="password" placeholder="Password (min 6 chars)" autocomplete="off" />
      <div id="auth-error"></div>
      <button id="auth-submit">Sign Up</button>
      <div id="auth-toggle">Already have an account? <span id="auth-toggle-link">Log in</span></div>
    </div>
  </div>

  <div id="columns">
    <div id="game-col">
      <h1>Snake</h1>
      <div id="user-bar">
        <span>Playing as <strong id="username-display"></strong></span>
        <button id="logout-btn">Logout</button>
      </div>
      <div id="score-display" style="display:none">Score: <span id="score-val">0</span></div>

      <!-- Mode Selection -->
      <div id="mp-entry" style="display:none">
        <p class="mp-heading">Choose a mode to play</p>
        <button class="mp-btn" onclick="createRoom()">Create Room</button>
        <div class="mp-join-row">
          <input id="room-input" placeholder="XXXXXX" maxlength="6">
          <button class="mp-btn" onclick="joinRoomFromInput()">Join</button>
        </div>
        <button class="mp-btn secondary" onclick="startSolo()">Solo Game</button>
      </div>

      <!-- Lobby -->
      <div id="mp-lobby" style="display:none">
        <p class="mp-heading">Share this code with friends:</p>
        <div id="room-code-display"></div>
        <p class="mp-heading" style="margin-top:4px">Players in room:</p>
        <ul id="lobby-players"></ul>
        <button id="start-btn" class="mp-btn" onclick="hostStartGame()" style="display:none">Start Game</button>
        <p id="lobby-status">Waiting for host to start…</p>
      </div>

      <!-- Canvas area -->
      <div id="canvas-wrap" style="display:none">
        <canvas id="c" width="600" height="600"></canvas>
        <div id="mp-end-overlay">
          <h2>Game Over</h2>
          <ul id="mp-end-scores"></ul>
          <button class="mp-btn" onclick="leaveRoom()">Leave Room</button>
        </div>
      </div>

      <div id="hint" style="display:none">Arrow keys to move</div>
    </div>
    <div id="lb-panel">
      <h3>Leaderboard</h3>
      <ul id="leaderboard-list">
        <li id="lb-status">Loading…</li>
      </ul>
    </div>
  </div>

  <script>
    // ── Supabase ──────────────────────────────────────────────
    const SUPABASE_URL = 'https://nsvienlugithpmehukjt.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_nyCIqLLTzWN7_im_rdFhVw_QHdgkdtw';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null;

    // ── Auth UI ───────────────────────────────────────────────
    const authModal    = document.getElementById('auth-modal');
    const authTitle    = document.getElementById('auth-title');
    const authUsername = document.getElementById('auth-username');
    const authPassword = document.getElementById('auth-password');
    const authError    = document.getElementById('auth-error');
    const authSubmit   = document.getElementById('auth-submit');

    let authMode = 'signup';

    function setupToggle() {
      const link = document.getElementById('auth-toggle-link');
      const wrap = document.getElementById('auth-toggle');
      link.onclick = () => {
        authMode = authMode === 'signup' ? 'login' : 'signup';
        const isSignup = authMode === 'signup';
        authTitle.textContent  = isSignup ? 'Sign Up' : 'Log In';
        authSubmit.textContent = isSignup ? 'Sign Up' : 'Log In';
        wrap.innerHTML = isSignup
          ? 'Already have an account? <span id="auth-toggle-link">Log in</span>'
          : 'No account? <span id="auth-toggle-link">Sign up</span>';
        authError.textContent = '';
        setupToggle();
      };
    }
    setupToggle();

    authSubmit.addEventListener('click', submitAuth);
    authPassword.addEventListener('keydown', e => { if (e.key === 'Enter') submitAuth(); });

    async function submitAuth() {
      const username = authUsername.value.trim();
      const password = authPassword.value;

      if (!username) { authError.textContent = 'Please enter a username.'; return; }
      if (!/^[a-zA-Z0-9_]{1,20}$/.test(username)) {
        authError.textContent = 'Letters, numbers, underscores only.'; return;
      }
      if (password.length < 6) { authError.textContent = 'Password must be at least 6 characters.'; return; }

      authSubmit.disabled    = true;
      authSubmit.textContent = authMode === 'signup' ? 'Signing up…' : 'Logging in…';
      authError.textContent  = '';

      const email = `${username.toLowerCase()}@snake.local`;
      const result = authMode === 'signup'
        ? await sb.auth.signUp({ email, password, options: { data: { username } } })
        : await sb.auth.signInWithPassword({ email, password });

      const { data, error } = result;

      if (error) {
        const msg = error.message || '';
        if (msg.includes('already registered') || msg.includes('already been registered')) {
          authError.textContent = 'Username already taken.';
        } else if (msg.includes('Invalid login') || msg.includes('invalid_credentials') || msg.includes('Invalid email or password')) {
          authError.textContent = 'Invalid username or password.';
        } else {
          authError.textContent = msg;
        }
        authSubmit.disabled    = false;
        authSubmit.textContent = authMode === 'signup' ? 'Sign Up' : 'Log In';
        return;
      }

      currentUser = {
        id:       data.user.id,
        username: data.user.user_metadata?.username || username,
      };
      showGame();
    }

    function showGame() {
      authModal.classList.add('hidden');
      document.getElementById('username-display').textContent = currentUser.username;
      fetchLeaderboard();
      showMpEntry();
    }

    document.getElementById('logout-btn').addEventListener('click', async () => {
      stopGameLoop();
      if (mpChannel) {
        try { await mpChannel.unsubscribe(); } catch(e) {}
        mpChannel = null;
      }
      multiplayerMode = false;
      spectating = false;
      await sb.auth.signOut();
      currentUser = null;
      showNothing();
      authMode               = 'signup';
      authTitle.textContent  = 'Sign Up';
      authSubmit.textContent = 'Sign Up';
      authSubmit.disabled    = false;
      authUsername.value     = '';
      authPassword.value     = '';
      authError.textContent  = '';
      document.getElementById('auth-toggle').innerHTML =
        'Already have an account? <span id="auth-toggle-link">Log in</span>';
      setupToggle();
      authModal.classList.remove('hidden');
    });

    // ── Leaderboard ───────────────────────────────────────────
    async function fetchLeaderboard() {
      const list = document.getElementById('leaderboard-list');
      list.innerHTML = '<li id="lb-status">Loading…</li>';

      const { data, error } = await sb
        .from('leaderboard')
        .select('username, best_score');

      list.innerHTML = '';

      if (error || !data || data.length === 0) {
        list.innerHTML = '<li id="lb-status">No scores yet!</li>';
        return;
      }

      data.forEach((entry, i) => {
        const li  = document.createElement('li');
        const isMe = currentUser && entry.username === currentUser.username;
        if (isMe) li.classList.add('me');
        li.innerHTML = `
          <span class="lb-rank">${i + 1}</span>
          <span class="lb-name">${escHtml(entry.username)}</span>
          <span class="lb-score">${entry.best_score}</span>
        `;
        list.appendChild(li);
      });
    }

    async function submitScore(score) {
      if (!currentUser) return;
      const { error } = await sb.from('scores').insert({
        user_id:  currentUser.id,
        username: currentUser.username,
        score,
      });
      if (!error) await fetchLeaderboard();
    }

    function escHtml(str) {
      return str.replace(/[&<>"']/g, c =>
        ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c])
      );
    }

    // ── Session Restore ───────────────────────────────────────
    async function bootAuth() {
      const { data: { session } } = await sb.auth.getSession();
      if (session) {
        currentUser = {
          id:       session.user.id,
          username: session.user.user_metadata?.username || 'Player',
        };
        showGame();
      }
    }

    // ── Multiplayer State ─────────────────────────────────────
    const PLAYER_COLORS = ['#39ff14', '#FF6B6B', '#4ECDC4', '#FFE66D', '#A8E6CF'];

    let multiplayerMode = false;
    let roomId    = null;
    let mpChannel = null;
    let isHost    = false;
    let peers     = new Map();      // username → { snake, score, color, dead }
    let playerColors = new Map();
    let deadPlayers = new Set();
    let myColor   = PLAYER_COLORS[0];
    let spectating = false;

    // ── Multiplayer UI Helpers ────────────────────────────────
    function showNothing() {
      document.getElementById('mp-entry').style.display    = 'none';
      document.getElementById('mp-lobby').style.display    = 'none';
      document.getElementById('canvas-wrap').style.display = 'none';
      document.getElementById('score-display').style.display = 'none';
      document.getElementById('hint').style.display        = 'none';
    }

    function showMpEntry() {
      showNothing();
      document.getElementById('mp-entry').style.display = 'flex';
    }

    function showLobby() {
      showNothing();
      document.getElementById('mp-lobby').style.display = 'flex';
      document.getElementById('room-code-display').textContent = roomId;
      document.getElementById('start-btn').style.display   = isHost ? 'block' : 'none';
      document.getElementById('lobby-status').style.display = isHost ? 'none' : 'block';
    }

    function showCanvas() {
      document.getElementById('mp-entry').style.display    = 'none';
      document.getElementById('mp-lobby').style.display    = 'none';
      document.getElementById('canvas-wrap').style.display = 'block';
      document.getElementById('score-display').style.display = '';
      document.getElementById('hint').style.display        = '';
    }

    // ── Multiplayer Channel ───────────────────────────────────
    async function createRoom() {
      const id = Math.random().toString(36).substr(2, 6).toUpperCase();
      await joinChannel(id, true);
    }

    async function joinRoomFromInput() {
      const raw = document.getElementById('room-input').value.trim().toUpperCase();
      if (!raw) return;
      await joinChannel(raw, false);
    }

    function startSolo() {
      multiplayerMode = false;
      showCanvas();
      init();
    }

    function hashUsername(username) {
      let hash = 0;
      for (let i = 0; i < username.length; i++) {
        hash = ((hash << 5) - hash) + username.charCodeAt(i);
        hash |= 0;
      }
      return Math.abs(hash);
    }

    function getPresencePlayers(state) {
      return [...new Set(
        Object.values(state)
        .flatMap(presences => presences)
        .map(presence => presence.username)
        .filter(Boolean)
      )].sort((a, b) => a.localeCompare(b));
    }

    function buildPlayerColorMap(state) {
      const colors = new Map();
      const usedSlots = new Set();

      getPresencePlayers(state).forEach(username => {
        let slot = hashUsername(username) % PLAYER_COLORS.length;
        let attempts = 0;
        while (usedSlots.has(slot) && attempts < PLAYER_COLORS.length) {
          slot = (slot + 1) % PLAYER_COLORS.length;
          attempts++;
        }
        usedSlots.add(slot);
        colors.set(username, PLAYER_COLORS[slot]);
      });

      return colors;
    }

    async function syncPlayerColors() {
      if (!mpChannel || !currentUser) return;
      const nextColors = buildPlayerColorMap(mpChannel.presenceState());
      playerColors = nextColors;

      const assignedColor = nextColors.get(currentUser.username) || PLAYER_COLORS[0];
      myColor = assignedColor;

      peers.forEach((peer, username) => {
        peer.color = nextColors.get(username) || peer.color || '#ccc';
      });
      gameplayLayerDirty = true;
    }

    async function joinChannel(id, hosting) {
      roomId = id;
      isHost = hosting;
      multiplayerMode = true;
      peers.clear();
      playerColors.clear();
      deadPlayers.clear();

      mpChannel = sb.channel('snake:room-' + id, {
        config: {
          broadcast: { self: false },
          presence:  { key: currentUser.username },
        }
      });

      mpChannel
        .on('presence', { event: 'sync' }, handlePresenceSync)
        .on('broadcast', { event: 'snake:state' }, ({ payload }) => updatePeer(payload))
        .on('broadcast', { event: 'game:start' }, () => startCountdown())
        .on('broadcast', { event: 'player:dead' }, ({ payload }) => {
          deadPlayers.add(payload.id);
          const p = peers.get(payload.id);
          if (p) { p.dead = true; p.score = payload.score; }
          checkAllDead();
        })
        .subscribe(async (status) => {
          if (status !== 'SUBSCRIBED') return;
          myColor = PLAYER_COLORS[0];
          await mpChannel.track({ username: currentUser.username, color: myColor });
          showLobby();
        });
    }

    async function handlePresenceSync() {
      await syncPlayerColors();
      updateLobbyList();
    }

    function updateLobbyList() {
      const state = mpChannel.presenceState();
      const list  = document.getElementById('lobby-players');
      list.innerHTML = '';
      getPresencePlayers(state).forEach(username => {
        const fallbackPresence = state[username]?.[0];
        const color = playerColors.get(username) || fallbackPresence?.color || '#fff';
        const li = document.createElement('li');
        li.innerHTML = `<span class="lobby-dot" style="background:${escHtml(color)}"></span>${escHtml(username)}`;
        list.appendChild(li);
      });
    }

    function updatePeer(payload) {
      const existing = peers.get(payload.id) || {};
      const nextSnake = (payload.snake || []).map(seg => ({ x: seg.x, y: seg.y }));
      const previousSnake = existing.snake
        ? existing.snake.map(seg => ({ x: seg.x, y: seg.y }))
        : nextSnake.map(seg => ({ x: seg.x, y: seg.y }));
      peers.set(payload.id, {
        snake: nextSnake,
        prevSnake: previousSnake,
        score: payload.score,
        color: playerColors.get(payload.id) || payload.color,
        dead:  existing.dead || false,
        updatedAt: performance.now(),
      });
      gameplayLayerDirty = true;
    }

    function hostStartGame() {
      mpChannel.send({ type: 'broadcast', event: 'game:start', payload: {} });
      startCountdown();
    }

    function startCountdown() {
      showCanvas();
      peers.clear();
      deadPlayers.clear();
      let count = 3;

      function drawCount(n) {
        buildBackgroundCache(true);
        ctx.drawImage(backgroundCanvas, 0, 0);
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.font         = 'bold 120px system-ui';
        ctx.fillStyle    = '#39ff14';
        ctx.shadowColor  = '#39ff14';
        ctx.shadowBlur   = 40;
        ctx.fillText(n > 0 ? String(n) : 'GO!', canvas.width / 2, canvas.height / 2);
        ctx.shadowBlur   = 0;
        ctx.textBaseline = 'alphabetic';
      }

      drawCount(count);
      const timer = setInterval(() => {
        count--;
        if (count > 0) {
          drawCount(count);
        } else if (count === 0) {
          drawCount(0);
        } else {
          clearInterval(timer);
          init();
        }
      }, 1000);
    }

    function broadcastSnakeState() {
      if (!mpChannel) return;
      mpChannel.send({
        type: 'broadcast',
        event: 'snake:state',
        payload: { id: currentUser.username, snake, score, color: myColor },
      });
    }

    function checkAllDead() {
      const total = peers.size + 1;
      if (deadPlayers.size >= total) {
        spectating = false;
        stopRenderer();
        showMultiplayerEndScreen();
      }
    }

    function showMultiplayerEndScreen() {
      const results = [{
        username: currentUser.username,
        score,
        color: playerColors.get(currentUser.username) || myColor,
      }];
      peers.forEach((peer, username) => {
        results.push({
          username,
          score: peer.score || 0,
          color: playerColors.get(username) || peer.color || '#ccc',
        });
      });
      results.sort((a, b) => b.score - a.score);

      const ul = document.getElementById('mp-end-scores');
      ul.innerHTML = '';
      results.forEach((r, i) => {
        const li = document.createElement('li');
        li.innerHTML = `
          <span class="end-rank">${i + 1}</span>
          <span class="end-dot" style="background:${escHtml(r.color)}"></span>
          <span class="end-name">${escHtml(r.username)}</span>
          <span class="end-score">${r.score}</span>
        `;
        ul.appendChild(li);
      });
      document.getElementById('mp-end-overlay').style.display = 'flex';
      submitScore(score);
    }

    async function leaveRoom() {
      spectating = false;
      gameOver = true;
      stopGameLoop();
      document.getElementById('mp-end-overlay').style.display = 'none';
      if (mpChannel) {
        try { await mpChannel.unsubscribe(); } catch(e) {}
        mpChannel = null;
      }
      multiplayerMode = false;
      roomId = null;
      isHost = false;
      peers.clear();
      playerColors.clear();
      deadPlayers.clear();
      showMpEntry();
    }

    function hexToRgba(hex, alpha) {
      const r = parseInt(hex.slice(1,3), 16);
      const g = parseInt(hex.slice(3,5), 16);
      const b = parseInt(hex.slice(5,7), 16);
      return `rgba(${r},${g},${b},${alpha})`;
    }

    // ── Game ──────────────────────────────────────────────────
    const canvas  = document.getElementById('c');
    const ctx     = canvas.getContext('2d');
    const scoreEl = document.getElementById('score-val');

    const CELL = 20;
    const COLS = canvas.width  / CELL;
    const ROWS = canvas.height / CELL;
    const TICK = 130;
    const MAX_INPUT_QUEUE = 3;
    const BACKGROUND_REFRESH_MS = 100;
    const INPUT_DIRECTIONS = {
      ArrowUp:    { x: 0,  y: -1 },
      ArrowDown:  { x: 0,  y: 1 },
      ArrowLeft:  { x: -1, y: 0 },
      ArrowRight: { x: 1,  y: 0 }
    };

    let snake, dir, inputQueue, food, score, gameLoop, gameOver;
    let backgroundCanvas, backgroundCtx, lastBackgroundRefresh;
    let gameplayCanvas, gameplayCtx, gameplayLayerDirty;
    let gridCanvas, gridCtx;
    let renderRaf;

    function init() {
      buildBackgroundCache(true);
      buildGameplayLayerCache();
      buildGridCache();
      resetGameState();
      startGameLoop();
      startRenderLoop();
    }

    // ── Game State ────────────────────────────────────────────
    function resetGameState() {
      snake      = [{ x: 15, y: 15 }, { x: 14, y: 15 }, { x: 13, y: 15 }];
      dir        = { x: 1, y: 0 };
      inputQueue = [];
      score      = 0;
      gameOver   = false;
      spectating = false;
      canvas._btn = null;
      gameplayLayerDirty = true;
      scoreEl.textContent = '0';
      spawnFood();
    }

    function startGameLoop() {
      clearInterval(gameLoop);
      gameLoop = setInterval(tick, TICK);
    }

    function stopSimulation() { clearInterval(gameLoop); }
    function stopRenderer()   { cancelAnimationFrame(renderRaf); }
    function stopGameLoop()   { stopSimulation(); stopRenderer(); }

    function spawnFood() {
      let pos;
      do {
        pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
      } while (snake.some(s => s.x === pos.x && s.y === pos.y));
      food = pos;
    }

    // ── Simulation ────────────────────────────────────────────
    function getNextHead() {
      return { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
    }

    function isOutOfBounds(pos) {
      return pos.x < 0 || pos.x >= COLS || pos.y < 0 || pos.y >= ROWS;
    }

    function hitsSnake(pos) {
      return snake.some(s => s.x === pos.x && s.y === pos.y);
    }

    function consumeQueuedDirection() {
      if (!inputQueue.length) return;
      dir = inputQueue.shift();
    }

    function tick() {
      consumeQueuedDirection();
      const head = getNextHead();
      if (isOutOfBounds(head) || hitsSnake(head)) { endGame(); return; }
      snake.unshift(head);
      if (head.x === food.x && head.y === food.y) {
        score += 10;
        scoreEl.textContent = score;
        spawnFood();
      } else {
        snake.pop();
      }
      gameplayLayerDirty = true;
      if (multiplayerMode) broadcastSnakeState();
    }

    // ── Rendering ─────────────────────────────────────────────
    function startRenderLoop() {
      cancelAnimationFrame(renderRaf);
      (function loop() {
        if (gameOver && !spectating) return;
        renderFrame();
        renderRaf = requestAnimationFrame(loop);
      })();
    }

    function buildGridCache() {
      gridCanvas = document.createElement('canvas');
      gridCanvas.width = canvas.width;
      gridCanvas.height = canvas.height;
      gridCtx = gridCanvas.getContext('2d');
      drawGridLines(gridCtx);
    }

    function buildGameplayLayerCache() {
      if (!gameplayCanvas) {
        gameplayCanvas = document.createElement('canvas');
        gameplayCanvas.width = canvas.width;
        gameplayCanvas.height = canvas.height;
        gameplayCtx = gameplayCanvas.getContext('2d');
      }
      gameplayLayerDirty = true;
    }

    function buildBackgroundCache(force = false) {
      const now = Date.now();
      if (!force && backgroundCanvas && now - lastBackgroundRefresh < BACKGROUND_REFRESH_MS) return;

      if (!backgroundCanvas) {
        backgroundCanvas = document.createElement('canvas');
        backgroundCanvas.width = canvas.width;
        backgroundCanvas.height = canvas.height;
        backgroundCtx = backgroundCanvas.getContext('2d');
      }
      lastBackgroundRefresh = now;

      const t    = now / 4000;
      const hue1 = (t * 60) % 360;
      const hue2 = (hue1 + 120) % 360;
      const hue3 = (hue1 + 240) % 360;
      const grad = backgroundCtx.createRadialGradient(
        canvas.width * 0.5, canvas.height * 0.4, 0,
        canvas.width * 0.5, canvas.height * 0.5, canvas.width * 0.8
      );
      grad.addColorStop(0,   `hsl(${hue1}, 40%, 8%)`);
      grad.addColorStop(0.5, `hsl(${hue2}, 50%, 6%)`);
      grad.addColorStop(1,   `hsl(${hue3}, 60%, 4%)`);
      backgroundCtx.fillStyle = grad;
      backgroundCtx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function drawAnimatedBackgroundLayer() {
      buildBackgroundCache();
      ctx.drawImage(backgroundCanvas, 0, 0);
    }

    function drawGridLines(targetCtx) {
      targetCtx.strokeStyle = 'rgba(255,255,255,0.03)';
      targetCtx.lineWidth   = 0.5;
      for (let x = 0; x <= canvas.width;  x += CELL) {
        targetCtx.beginPath(); targetCtx.moveTo(x, 0); targetCtx.lineTo(x, canvas.height); targetCtx.stroke();
      }
      for (let y = 0; y <= canvas.height; y += CELL) {
        targetCtx.beginPath(); targetCtx.moveTo(0, y); targetCtx.lineTo(canvas.width, y); targetCtx.stroke();
      }
    }

    function drawStaticGridLayer() {
      if (!gridCanvas) buildGridCache();
      ctx.drawImage(gridCanvas, 0, 0);
    }

    function drawGameplayObjects(targetCtx) {
      if (!food) return;
      // Food
      targetCtx.shadowColor = '#ff4136';
      targetCtx.shadowBlur  = 14;
      targetCtx.fillStyle   = '#ff4136';
      const fx = food.x * CELL + 2, fy = food.y * CELL + 2, fs = CELL - 4;
      targetCtx.beginPath();
      targetCtx.arc(fx + fs / 2, fy + fs / 2, fs / 2, 0, Math.PI * 2);
      targetCtx.fill();
      targetCtx.shadowBlur = 0;
      // My snake (faded when dead/spectating)
      targetCtx.globalAlpha = spectating ? 0.25 : 1;
      snake.forEach((seg, i) => {
        const x = seg.x * CELL + 1, y = seg.y * CELL + 1, s = CELL - 2;
        const isHead = i === 0;
        if (isHead) {
          targetCtx.shadowColor = myColor;
          targetCtx.shadowBlur  = 16;
          targetCtx.fillStyle   = myColor;
        } else {
          targetCtx.shadowBlur = 0;
          targetCtx.fillStyle  = multiplayerMode
            ? hexToRgba(myColor, 0.65 - (i / snake.length) * 0.3)
            : `rgb(30, ${Math.round(200 - (i / snake.length) * 90)}, 20)`;
        }
        targetCtx.beginPath();
        targetCtx.roundRect(x, y, s, s, isHead ? 5 : 3);
        targetCtx.fill();
      });
      targetCtx.shadowBlur  = 0;
      targetCtx.globalAlpha = 1;
      // Eyes (only when alive)
      if (!spectating) {
        targetCtx.fillStyle = '#111';
        getEyePositions(snake[0].x * CELL, snake[0].y * CELL, dir, 5).forEach(([ex, ey]) => {
          targetCtx.beginPath();
          targetCtx.arc(ex, ey, 2.5, 0, Math.PI * 2);
          targetCtx.fill();
        });
      }
    }

    function drawPeerSnakes(targetCtx) {
      const now = performance.now();
      peers.forEach((peer, username) => {
        if (!peer.snake || peer.snake.length === 0) return;
        const alpha = peer.dead ? 0.25 : 1;
        const peerColor = playerColors.get(username) || peer.color || '#ccc';
        const elapsed = now - (peer.updatedAt || now);
        const lerpFactor = peer.dead ? 1 : Math.min(elapsed / TICK, 1);
        peer.snake.forEach((seg, i) => {
          const prevSeg = peer.prevSnake?.[i] || seg;
          const drawX = prevSeg.x + (seg.x - prevSeg.x) * lerpFactor;
          const drawY = prevSeg.y + (seg.y - prevSeg.y) * lerpFactor;
          const s = CELL - 2;
          const isHead = i === 0;
          targetCtx.globalAlpha = alpha;
          if (isHead) {
            targetCtx.shadowColor = peerColor;
            targetCtx.shadowBlur  = 16;
            targetCtx.fillStyle   = peerColor;
          } else {
            targetCtx.shadowBlur = 0;
            targetCtx.fillStyle  = hexToRgba(peerColor, 0.65 - (i / peer.snake.length) * 0.3);
          }
          targetCtx.beginPath();
          targetCtx.roundRect(drawX * CELL + 1, drawY * CELL + 1, s, s, isHead ? 5 : 3);
          targetCtx.fill();
        });
        targetCtx.shadowBlur  = 0;
        targetCtx.globalAlpha = 1;
      });
    }

    function getEyePositions(hx, hy, d, o) {
      const cx = hx + CELL / 2, cy = hy + CELL / 2;
      if (d.x ===  1) return [[cx + 4, cy - o], [cx + 4, cy + o]];
      if (d.x === -1) return [[cx - 4, cy - o], [cx - 4, cy + o]];
      if (d.y === -1) return [[cx - o, cy - 4], [cx + o, cy - 4]];
      return                  [[cx - o, cy + 4], [cx + o, cy + 4]];
    }

    function drawCachedLayers() {
      drawAnimatedBackgroundLayer();
      drawStaticGridLayer();
    }

    function rebuildGameplayLayer() {
      if (!gameplayCanvas) buildGameplayLayerCache();
      gameplayCtx.clearRect(0, 0, canvas.width, canvas.height);
      if (multiplayerMode) drawPeerSnakes(gameplayCtx);
      drawGameplayObjects(gameplayCtx);
      gameplayLayerDirty = false;
    }

    function drawDynamicLayers() {
      if (gameplayLayerDirty) rebuildGameplayLayer();
      ctx.drawImage(gameplayCanvas, 0, 0);
    }

    function drawSpectatingOverlay() {
      ctx.fillStyle    = 'rgba(0,0,0,0.25)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'top';
      ctx.font         = 'bold 16px system-ui';
      ctx.fillStyle    = 'rgba(255,255,255,0.5)';
      ctx.fillText('You died — spectating', canvas.width / 2, 14);
      ctx.textBaseline = 'alphabetic';
    }

    function renderFrame() {
      drawCachedLayers();
      drawDynamicLayers();
      if (spectating) drawSpectatingOverlay();
    }

    async function endGame() {
      gameOver = true;

      if (multiplayerMode) {
        stopSimulation();
        spectating = true;
        gameplayLayerDirty = true; // redraw snake faded
        if (mpChannel) {
          mpChannel.send({
            type: 'broadcast',
            event: 'player:dead',
            payload: { id: currentUser.username, score },
          });
        }
        deadPlayers.add(currentUser.username);
        checkAllDead();
        return;
      }

      // Solo game over
      stopGameLoop();
      renderFrame();
      await submitScore(score);

      ctx.fillStyle = 'rgba(0,0,0,0.75)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.textAlign = 'center';
      ctx.fillStyle = '#fff';
      ctx.font      = 'bold 36px system-ui';
      ctx.fillText('Game Over', canvas.width / 2, canvas.height / 2 - 50);

      ctx.font = '20px system-ui'; ctx.fillStyle = '#aaa';
      ctx.fillText(`Score: ${score}`, canvas.width / 2, canvas.height / 2 - 10);

      const bw = 160, bh = 44,
            bx = canvas.width  / 2 - bw / 2,
            by = canvas.height / 2 + 20;

      ctx.fillStyle = '#39ff14'; ctx.shadowColor = '#39ff14'; ctx.shadowBlur = 18;
      ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 8); ctx.fill();
      ctx.shadowBlur = 0;

      ctx.fillStyle = '#111'; ctx.font = 'bold 17px system-ui';
      ctx.fillText('Play Again', canvas.width / 2, by + bh / 2 + 6);

      canvas._btn = { x: bx, y: by, w: bw, h: bh };
    }

    // ── Input ─────────────────────────────────────────────────
    function getDirectionFromKey(key) { return INPUT_DIRECTIONS[key]; }

    function isSameDirection(a, b) { return a.x === b.x && a.y === b.y; }

    function getEffectiveDirection() { return inputQueue[inputQueue.length - 1] || dir; }

    function isValidQueuedDirection(direction) {
      const eff = getEffectiveDirection();
      if (isSameDirection(direction, eff)) return false;
      return direction.x !== -eff.x || direction.y !== -eff.y;
    }

    function enqueueDirection(direction) {
      if (inputQueue.length >= MAX_INPUT_QUEUE) return false;
      if (!isValidQueuedDirection(direction)) return false;
      inputQueue.push(direction);
      return true;
    }

    function handleDirectionInput(key) {
      const direction = getDirectionFromKey(key);
      if (direction) enqueueDirection(direction);
      return Boolean(direction);
    }

    function handleKeydown(e) {
      if (handleDirectionInput(e.key)) e.preventDefault();
    }

    function handleCanvasClick(e) {
      if (!gameOver || !canvas._btn) return;
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left, my = e.clientY - rect.top;
      const { x, y, w, h } = canvas._btn;
      if (mx >= x && mx <= x + w && my >= y && my <= y + h) {
        canvas._btn = null;
        init();
      }
    }

    function updateCanvasCursor(e) {
      if (!gameOver || !canvas._btn) { canvas.style.cursor = 'default'; return; }
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left, my = e.clientY - rect.top;
      const { x, y, w, h } = canvas._btn;
      canvas.style.cursor = (mx >= x && mx <= x + w && my >= y && my <= y + h) ? 'pointer' : 'default';
    }

    document.addEventListener('keydown', handleKeydown);
    canvas.addEventListener('click', handleCanvasClick);
    canvas.style.cursor = 'default';
    canvas.addEventListener('mousemove', updateCanvasCursor);

    // ── roundRect polyfill ────────────────────────────────────
    if (!CanvasRenderingContext2D.prototype.roundRect) {
      CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
        this.beginPath();
        this.moveTo(x + r, y); this.lineTo(x + w - r, y);
        this.quadraticCurveTo(x + w, y, x + w, y + r);
        this.lineTo(x + w, y + h - r);
        this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        this.lineTo(x + r, y + h);
        this.quadraticCurveTo(x, y + h, x, y + h - r);
        this.lineTo(x, y + r);
        this.quadraticCurveTo(x, y, x + r, y);
        this.closePath();
      };
    }

    // ── Boot ──────────────────────────────────────────────────
    bootAuth();
  </script>
</body>
</html>
