<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      animation: hueShift 8s linear infinite;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
    }

    @keyframes hueShift {
      0%   { background: radial-gradient(ellipse at center, #1a0a2e 0%, #0d1b3e 50%, #0a2a1f 100%); }
      25%  { background: radial-gradient(ellipse at center, #0a2030 0%, #1a0a2e 50%, #2a0a3e 100%); }
      50%  { background: radial-gradient(ellipse at center, #0d1b3e 0%, #0a2a1f 50%, #1a0010 100%); }
      75%  { background: radial-gradient(ellipse at center, #2a0a3e 0%, #0d2030 50%, #0a1a2e 100%); }
      100% { background: radial-gradient(ellipse at center, #1a0a2e 0%, #0d1b3e 50%, #0a2a1f 100%); }
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #39ff14;
      text-shadow: 0 0 12px #39ff1488;
      margin-bottom: 16px;
    }

    #score-display {
      font-size: 1.1rem;
      color: #aaa;
      margin-bottom: 12px;
      letter-spacing: 0.08em;
    }

    #score-display span {
      color: #fff;
      font-weight: bold;
    }

    canvas {
      display: block;
      border: 2px solid #2a2a2a;
      border-radius: 4px;
      box-shadow: 0 0 30px #39ff1422;
    }

    #hint {
      margin-top: 14px;
      font-size: 0.8rem;
      color: #444;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>
  <h1>Snake</h1>
  <div id="score-display">Score: <span id="score-val">0</span></div>
  <canvas id="c" width="600" height="600"></canvas>
  <div id="hint">Arrow keys to move</div>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score-val');

    const CELL = 20;
    const COLS = canvas.width / CELL;
    const ROWS = canvas.height / CELL;
    const TICK = 130;

    let snake, dir, nextDir, food, score, loop, gameOver;

    // Animated background RAF loop
    function drawBackground() {
      const t = Date.now() / 4000; // full cycle every ~25s
      const hue1 = (t * 60) % 360;        // slowly shifts hue
      const hue2 = (hue1 + 120) % 360;    // complementary
      const hue3 = (hue1 + 240) % 360;

      const grad = ctx.createRadialGradient(
        canvas.width * 0.5, canvas.height * 0.4, 0,
        canvas.width * 0.5, canvas.height * 0.5, canvas.width * 0.8
      );
      grad.addColorStop(0,   `hsl(${hue1}, 40%, 8%)`);
      grad.addColorStop(0.5, `hsl(${hue2}, 50%, 6%)`);
      grad.addColorStop(1,   `hsl(${hue3}, 60%, 4%)`);

      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    let bgRaf;
    function startBgLoop() {
      cancelAnimationFrame(bgRaf);
      function loop() {
        if (gameOver) return; // game draw handles its own overlay
        drawBackground();
        drawGrid();
        drawGameObjects();
        bgRaf = requestAnimationFrame(loop);
      }
      bgRaf = requestAnimationFrame(loop);
    }

    function drawGrid() {
      ctx.strokeStyle = 'rgba(255,255,255,0.03)';
      ctx.lineWidth = 0.5;
      for (let x = 0; x <= canvas.width; x += CELL) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
      }
      for (let y = 0; y <= canvas.height; y += CELL) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
      }
    }

    function drawGameObjects() {
      if (!food) return;

      // Food
      ctx.shadowColor = '#ff4136';
      ctx.shadowBlur = 14;
      ctx.fillStyle = '#ff4136';
      const fx = food.x * CELL + 2, fy = food.y * CELL + 2, fs = CELL - 4;
      ctx.beginPath();
      ctx.arc(fx + fs / 2, fy + fs / 2, fs / 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;

      // Snake body
      snake.forEach((seg, i) => {
        const x = seg.x * CELL + 1, y = seg.y * CELL + 1, s = CELL - 2;
        const isHead = i === 0;
        if (isHead) {
          ctx.shadowColor = '#39ff14';
          ctx.shadowBlur = 16;
          ctx.fillStyle = '#39ff14';
        } else {
          ctx.shadowBlur = 0;
          const t = i / snake.length;
          const g = Math.round(200 - t * 90);
          ctx.fillStyle = `rgb(30, ${g}, 20)`;
        }
        ctx.beginPath();
        ctx.roundRect(x, y, s, s, isHead ? 5 : 3);
        ctx.fill();
      });
      ctx.shadowBlur = 0;

      // Eyes
      const hx = snake[0].x * CELL, hy = snake[0].y * CELL;
      ctx.fillStyle = '#111';
      const eyeOffset = 5, eyeR = 2.5;
      const eyes = getEyePositions(hx, hy, dir, eyeOffset);
      eyes.forEach(([ex, ey]) => {
        ctx.beginPath();
        ctx.arc(ex, ey, eyeR, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function init() {
      snake = [
        { x: 15, y: 15 },
        { x: 14, y: 15 },
        { x: 13, y: 15 },
      ];
      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score = 0;
      gameOver = false;
      scoreEl.textContent = '0';
      spawnFood();
      clearInterval(loop);
      loop = setInterval(tick, TICK);
      startBgLoop();
    }

    function spawnFood() {
      let pos;
      do {
        pos = {
          x: Math.floor(Math.random() * COLS),
          y: Math.floor(Math.random() * ROWS),
        };
      } while (snake.some(s => s.x === pos.x && s.y === pos.y));
      food = pos;
    }

    function tick() {
      dir = nextDir;

      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      // Wall collision
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
        endGame(); return;
      }
      // Self collision
      if (snake.some(s => s.x === head.x && s.y === head.y)) {
        endGame(); return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += 10;
        scoreEl.textContent = score;
        spawnFood();
      } else {
        snake.pop();
      }

      draw();
    }

    function draw() {
      drawBackground();
      drawGrid();
      drawGameObjects();
    }

    function getEyePositions(hx, hy, d, o) {
      const cx = hx + CELL / 2, cy = hy + CELL / 2;
      if (d.x === 1)  return [[cx + 4, cy - o], [cx + 4, cy + o]];
      if (d.x === -1) return [[cx - 4, cy - o], [cx - 4, cy + o]];
      if (d.y === -1) return [[cx - o, cy - 4], [cx + o, cy - 4]];
      return                  [[cx - o, cy + 4], [cx + o, cy + 4]];
    }

    function endGame() {
      clearInterval(loop);
      cancelAnimationFrame(bgRaf);
      gameOver = true;
      draw();

      // Overlay
      ctx.fillStyle = 'rgba(0,0,0,0.72)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.textAlign = 'center';
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 36px system-ui';
      ctx.fillText('Game Over', canvas.width / 2, canvas.height / 2 - 50);

      ctx.font = '20px system-ui';
      ctx.fillStyle = '#aaa';
      ctx.fillText(`Score: ${score}`, canvas.width / 2, canvas.height / 2 - 10);

      // Play Again button
      const bw = 160, bh = 44, bx = canvas.width / 2 - bw / 2, by = canvas.height / 2 + 20;
      ctx.fillStyle = '#39ff14';
      ctx.shadowColor = '#39ff14';
      ctx.shadowBlur = 18;
      ctx.beginPath();
      ctx.roundRect(bx, by, bw, bh, 8);
      ctx.fill();
      ctx.shadowBlur = 0;

      ctx.fillStyle = '#111';
      ctx.font = 'bold 17px system-ui';
      ctx.fillText('Play Again', canvas.width / 2, by + bh / 2 + 6);

      // Store button bounds for click
      canvas._btn = { x: bx, y: by, w: bw, h: bh };
    }

    // Input
    document.addEventListener('keydown', e => {
      const map = {
        ArrowUp:    { x: 0,  y: -1 },
        ArrowDown:  { x: 0,  y:  1 },
        ArrowLeft:  { x: -1, y:  0 },
        ArrowRight: { x: 1,  y:  0 },
      };
      if (map[e.key]) {
        e.preventDefault();
        const d = map[e.key];
        // Prevent reversing
        if (d.x !== -dir.x || d.y !== -dir.y) nextDir = d;
      }
    });

    canvas.addEventListener('click', e => {
      if (!gameOver || !canvas._btn) return;
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left, my = e.clientY - rect.top;
      const { x, y, w, h } = canvas._btn;
      if (mx >= x && mx <= x + w && my >= y && my <= y + h) init();
    });

    canvas.style.cursor = 'default';
    canvas.addEventListener('mousemove', e => {
      if (!gameOver || !canvas._btn) { canvas.style.cursor = 'default'; return; }
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left, my = e.clientY - rect.top;
      const { x, y, w, h } = canvas._btn;
      canvas.style.cursor = (mx >= x && mx <= x + w && my >= y && my <= y + h) ? 'pointer' : 'default';
    });

    // Polyfill roundRect for older browsers
    if (!CanvasRenderingContext2D.prototype.roundRect) {
      CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
        this.beginPath();
        this.moveTo(x + r, y);
        this.lineTo(x + w - r, y);
        this.quadraticCurveTo(x + w, y, x + w, y + r);
        this.lineTo(x + w, y + h - r);
        this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        this.lineTo(x + r, y + h);
        this.quadraticCurveTo(x, y + h, x, y + h - r);
        this.lineTo(x, y + r);
        this.quadraticCurveTo(x, y, x + r, y);
        this.closePath();
      };
    }

    init();
  </script>
</body>
</html>
